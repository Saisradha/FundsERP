version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=erpflow_super_secret_jwt_key_2026
      - JWT_EXPIRES_IN=1d
      - JWT_REFRESH_SECRET=erpflow_super_secret_refresh_key_2026
      - CORS_ORIGIN=*
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
